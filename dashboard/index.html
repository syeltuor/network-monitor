<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #60a5fa;
        }
        
        .last-update {
            color: #94a3b8;
            font-size: 0.9em;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #334155;
        }
        
        .status-card.success {
            border-color: #22c55e;
        }
        
        .status-card.warning {
            border-color: #eab308;
        }
        
        .status-card.error {
            border-color: #ef4444;
        }
        
        .status-card h3 {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .status-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .status-label {
            font-size: 0.85em;
            color: #64748b;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        button.active {
            background: #1d4ed8;
        }
        
        .chart-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #334155;
        }
        
        .chart-container h2 {
            margin-bottom: 15px;
            color: #60a5fa;
            font-size: 1.3em;
        }
        
        canvas {
            max-height: 300px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #94a3b8;
        }
        
        .error-message {
            background: #7f1d1d;
            border: 2px solid #ef4444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #fecaca;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 Network Monitor</h1>
            <div class="last-update" id="lastUpdate">Loading...</div>
            <div style="margin-top: 15px;">
                <select id="locationSelector" style="padding: 8px 15px; font-size: 1em; border-radius: 6px; background: #1e293b; color: #e2e8f0; border: 2px solid #334155; cursor: pointer;">
                    <option value="">Loading locations...</option>
                </select>
            </div>
        </header>
        
        <div id="errorContainer"></div>
        
        <div class="status-grid" id="statusGrid">
            <div class="loading">Loading current status...</div>
        </div>
        
        <div class="controls">
            <button class="active" data-period="1h">Last Hour</button>
            <button data-period="24h">Last 24 Hours</button>
            <button data-period="7d">Last 7 Days</button>
            <button data-period="30d">Last 30 Days</button>
            <button id="refreshBtn">🔄 Refresh</button>
        </div>
        
        <div class="chart-container">
            <h2>Ping Latency</h2>
            <canvas id="pingChart"></canvas>
        </div>
        
        <div class="chart-container">
            <h2>Internet Speed</h2>
            <canvas id="speedChart"></canvas>
        </div>
        
        <div class="chart-container">
            <h2>Packet Loss</h2>
            <canvas id="packetLossChart"></canvas>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
